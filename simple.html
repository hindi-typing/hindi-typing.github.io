<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to Hindi Transliteration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .transliteration-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .input-section, .output-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #667eea;
        }

        #hindiOutput {
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            font-size: 18px;
            line-height: 1.6;
            background: white;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: #f8f9fa;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-english {
            color: #495057;
            font-weight: 500;
        }

        .suggestion-hindi {
            color: #667eea;
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .examples {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }

        .examples h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .example-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .example-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .example-item:hover {
            border-color: #667eea;
            transform: scale(1.02);
        }

        .example-english {
            color: #495057;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .example-hindi {
            color: #667eea;
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .transliteration-area {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇮🇳 English to Hindi Transliteration</h1>
            <p>Convert English text to Hindi (Devanagari) script</p>
        </div>

        <div class="main-content">
            <div class="transliteration-area">
                <div class="input-section">
                    <div class="section-title">
                        ⌨️ English Input
                    </div>
                    <div class="input-area">
                        <textarea 
                            id="englishInput" 
                            placeholder="Type English text here... Try: namaste, bharat, yoga"
                        ></textarea>
                        <div class="suggestions" id="suggestions"></div>
                    </div>
                </div>

                <div class="output-section">
                    <div class="section-title">
                        🔤 Hindi Output
                    </div>
                    <textarea 
                        id="hindiOutput" 
                        placeholder="Hindi transliteration will appear here..."
                        readonly
                    ></textarea>
                </div>
            </div>

            <div class="controls">
                <button onclick="clearAll()">🗑️ Clear All</button>
                <button onclick="copyOutput()">📋 Copy Hindi Text</button>
            </div>

            <div class="examples">
                <h3>✨ Click to Try Examples</h3>
                <div class="example-grid">
                    <div class="example-item" onclick="setExample('namaste')">
                        <div class="example-english">namaste</div>
                        <div class="example-hindi">नमस्ते</div>
                    </div>
                    <div class="example-item" onclick="setExample('bharat')">
                        <div class="example-english">bharat</div>
                        <div class="example-hindi">भारत</div>
                    </div>
                    <div class="example-item" onclick="setExample('yoga')">
                        <div class="example-english">yoga</div>
                        <div class="example-hindi">योग</div>
                    </div>
                    <div class="example-item" onclick="setExample('guru')">
                        <div class="example-english">guru</div>
                        <div class="example-hindi">गुरु</div>
                    </div>
                    <div class="example-item" onclick="setExample('dharma')">
                        <div class="example-english">dharma</div>
                        <div class="example-hindi">धर्म</div>
                    </div>
                    <div class="example-item" onclick="setExample('karma')">
                        <div class="example-english">karma</div>
                        <div class="example-hindi">कर्म</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Word database - exact translations
        const wordDatabase = {
            // Common greetings
            'namaste': 'नमस्ते',
            'namaskar': 'नमस्कार',
            'pranam': 'प्रणाम',
            'dhanyawad': 'धन्यवाद',
            'shukriya': 'शुक्रिया',
            
            // Spiritual terms
            'yoga': 'योग',
            'guru': 'गुरु',
            'mantra': 'मंत्र',
            'dharma': 'धर्म',
            'karma': 'कर्म',
            'moksha': 'मोक्ष',
            'ahimsa': 'अहिंसा',
            'satya': 'सत्य',
            'shanti': 'शांति',
            'bhakti': 'भक्ति',
            'seva': 'सेवा',
            'dhyan': 'ध्यान',
            
            // Places
            'bharat': 'भारत',
            'india': 'भारत',
            'hindustan': 'हिंदुस्तान',
            'delhi': 'दिल्ली',
            'mumbai': 'मुंबई',
            'kolkata': 'कोलकाता',
            'chennai': 'चेन्नई',
            'bangalore': 'बैंगलोर',
            'hyderabad': 'हैदराबाद',
            'pune': 'पुणे',
            'jaipur': 'जयपुर',
            'agra': 'आगरा',
            'varanasi': 'वाराणसी',
            
            // Languages
            'sanskrit': 'संस्कृत',
            'hindi': 'हिंदी',
            'urdu': 'उर्दू',
            'bengali': 'बंगाली',
            'tamil': 'तमिल',
            'marathi': 'मराठी',
            
            // Family
            'mata': 'माता',
            'pita': 'पिता',
            'maa': 'माँ',
            'papa': 'पापा',
            'bhai': 'भाई',
            'behan': 'बहन',
            'beta': 'बेटा',
            'beti': 'बेटी',
            
            // Common words
            'ghar': 'घर',
            'paani': 'पानी',
            'khana': 'खाना',
            'kaam': 'काम',
            'din': 'दिन',
            'raat': 'रात',
            'subah': 'सुबह',
            'shaam': 'शाम',
            'aaj': 'आज',
            'kal': 'कल',
            'yaha': 'यहाँ',
            'waha': 'वहाँ',
            
            // Colors
            'safed': 'सफेद',
            'kala': 'काला',
            'lal': 'लाल',
            'neela': 'नीला',
            'hara': 'हरा',
            'peela': 'पीला',
            'gulabi': 'गुलाबी',
            
            // Numbers
            'ek': 'एक',
            'do': 'दो',
            'teen': 'तीन',
            'char': 'चार',
            'panch': 'पांच',
            'chhe': 'छह',
            'saat': 'सात',
            'aath': 'आठ',
            'nau': 'नौ',
            'das': 'दस',
            
            // People
            'gandhi': 'गांधी',
            'nehru': 'नेहरू',
            'shivaji': 'शिवाजी',
            
            // Festivals
            'diwali': 'दिवाली',
            'holi': 'होली',
            'dussehra': 'दशहरा',
            'rakhi': 'राखी',
            
            // Deities
            'krishna': 'कृष्ण',
            'rama': 'राम',
            'sita': 'सीता',
            'hanuman': 'हनुमान',
            'ganesha': 'गणेश',
            'shiva': 'शिव',
            'vishnu': 'विष्णु',
            'durga': 'दुर्गा'
        };

        // Character mappings for basic transliteration
        const charMap = {
            // Vowels
            'a': 'अ', 'aa': 'आ', 'i': 'इ', 'ii': 'ई', 'u': 'उ', 'uu': 'ऊ',
            'e': 'ए', 'ai': 'ऐ', 'o': 'ओ', 'au': 'औ',
            
            // Consonants with 'a'
            'ka': 'क', 'kha': 'ख', 'ga': 'ग', 'gha': 'घ',
            'cha': 'च', 'chha': 'छ', 'ja': 'ज', 'jha': 'झ',
            'ta': 'त', 'tha': 'थ', 'da': 'द', 'dha': 'ध', 'na': 'न',
            'pa': 'प', 'pha': 'फ', 'ba': 'ब', 'bha': 'भ', 'ma': 'म',
            'ya': 'य', 'ra': 'र', 'la': 'ल', 'va': 'व', 'wa': 'व',
            'sha': 'श', 'sa': 'स', 'ha': 'ह',
            
            // Special combinations
            'ksha': 'क्ष', 'tra': 'त्र', 'gya': 'ज्ञ',
            
            // Numbers
            '0': '०', '1': '१', '2': '२', '3': '३', '4': '४',
            '5': '५', '6': '६', '7': '७', '8': '८', '9': '९'
        };

        // DOM elements
        const englishInput = document.getElementById('englishInput');
        const hindiOutput = document.getElementById('hindiOutput');
        const suggestionsDiv = document.getElementById('suggestions');

        // Main transliteration function
        function transliterate(text) {
            if (!text) return '';
            
            const words = text.split(/(\s+)/);
            
            return words.map(word => {
                if (/^\s+$/.test(word)) {
                    return word; // Keep spaces
                }
                
                const lowerWord = word.toLowerCase();
                
                // Check for exact word match
                if (wordDatabase[lowerWord]) {
                    return wordDatabase[lowerWord];
                }
                
                // Character-by-character transliteration
                let result = '';
                let i = 0;
                
                while (i < lowerWord.length) {
                    let matched = false;
                    
                    // Try longer patterns first
                    for (let len = 4; len >= 1; len--) {
                        if (i + len <= lowerWord.length) {
                            const substr = lowerWord.substr(i, len);
                            if (charMap[substr]) {
                                result += charMap[substr];
                                i += len;
                                matched = true;
                                break;
                            }
                        }
                    }
                    
                    if (!matched) {
                        result += lowerWord[i];
                        i++;
                    }
                }
                
                return result;
            }).join('');
        }

        // Get suggestions
        function getSuggestions(input) {
            if (!input || input.length < 2) return [];
            
            const searchTerm = input.toLowerCase();
            const suggestions = [];
            
            Object.keys(wordDatabase).forEach(word => {
                if (word.startsWith(searchTerm) || word.includes(searchTerm)) {
                    suggestions.push({
                        english: word,
                        hindi: wordDatabase[word]
                    });
                }
            });
            
            // Sort by relevance
            suggestions.sort((a, b) => {
                const aStarts = a.english.startsWith(searchTerm);
                const bStarts = b.english.startsWith(searchTerm);
                
                if (aStarts && !bStarts) return -1;
                if (!aStarts && bStarts) return 1;
                
                return a.english.length - b.english.length;
            });
            
            return suggestions.slice(0, 5);
        }

        // Show suggestions
        function showSuggestions(suggestions) {
            if (!suggestions || suggestions.length === 0) {
                suggestionsDiv.classList.remove('show');
                return;
            }
            
            suggestionsDiv.innerHTML = suggestions.map(s => `
                <div class="suggestion-item" onclick="selectSuggestion('${s.english}')">
                    <span class="suggestion-english">${s.english}</span>
                    <span class="suggestion-hindi">${s.hindi}</span>
                </div>
            `).join('');
            
            suggestionsDiv.classList.add('show');
        }

        // Select suggestion
        function selectSuggestion(word) {
            const cursorPos = englishInput.selectionStart;
            const text = englishInput.value;
            
            // Find current word boundaries
            let start = cursorPos;
            let end = cursorPos;
            
            while (start > 0 && /[a-zA-Z]/.test(text[start - 1])) {
                start--;
            }
            
            while (end < text.length && /[a-zA-Z]/.test(text[end])) {
                end++;
            }
            
            // Replace current word
            const newText = text.substring(0, start) + word + text.substring(end);
            englishInput.value = newText;
            
            // Update transliteration
            hindiOutput.value = transliterate(newText);
            
            // Hide suggestions
            suggestionsDiv.classList.remove('show');
            
            // Focus back on input
            englishInput.focus();
            englishInput.setSelectionRange(start + word.length, start + word.length);
        }

        // Get current word being typed
        function getCurrentWord() {
            const cursorPos = englishInput.selectionStart;
            const text = englishInput.value;
            
            let start = cursorPos;
            let end = cursorPos;
            
            while (start > 0 && /[a-zA-Z]/.test(text[start - 1])) {
                start--;
            }
            
            while (end < text.length && /[a-zA-Z]/.test(text[end])) {
                end++;
            }
            
            return text.substring(start, end);
        }

        // Event listeners
        englishInput.addEventListener('input', function() {
            const transliteratedText = transliterate(this.value);
            hindiOutput.value = transliteratedText;
            
            // Show suggestions for current word
            const currentWord = getCurrentWord();
            if (currentWord && currentWord.length >= 2) {
                const suggestions = getSuggestions(currentWord);
                showSuggestions(suggestions);
            } else {
                suggestionsDiv.classList.remove('show');
            }
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-area')) {
                suggestionsDiv.classList.remove('show');
            }
        });

        // Utility functions
        function clearAll() {
            englishInput.value = '';
            hindiOutput.value = '';
            suggestionsDiv.classList.remove('show');
            englishInput.focus();
        }

        function copyOutput() {
            const text = hindiOutput.value;
            if (!text) {
                alert('No text to copy!');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Hindi text copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                hindiOutput.select();
                document.execCommand('copy');
                alert('Hindi text copied to clipboard!');
            });
        }

        function setExample(word) {
            englishInput.value = word;
            hindiOutput.value = transliterate(word);
            suggestionsDiv.classList.remove('show');
            englishInput.focus();
        }

        // Initialize
        englishInput.focus();
    </script>
</body>
</html>
